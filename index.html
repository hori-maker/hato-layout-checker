<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生徒会誌 原稿チェッカー</title>
  <style>
    :root {
      --bg-color: #cbd5e1;
      --sidebar-width: 360px;
      --paper-width: 680px;
      --paper-height: 920px;
      --font-serif: "Shippori Mincho", "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "MS Mincho", serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: #333;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左側：操作パネル */
    .sidebar {
      width: var(--sidebar-width);
      background: #ffffff;
      border-right: 1px solid #94a3b8;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
      overflow-y: auto;
      flex-shrink: 0;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      z-index: 10;
    }

    .sidebar h1 { font-size: 1.15rem; color: #0f172a; border-bottom: 2px solid #2563eb; padding-bottom: 6px; }

    .status-card { padding: 14px; border-radius: 6px; font-size: 0.9rem; line-height: 1.5; }
    .status-card.success { background-color: #f0fff4; border: 1px solid #86efac; color: #166534; }
    .status-card.warning { background-color: #fff1f2; border: 1px solid #fca5a5; color: #991b1b; }
    .status-title { font-weight: bold; font-size: 1rem; margin-bottom: 4px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.85rem; font-weight: 600; color: #475569; }
    input[type="text"], input[type="number"], textarea {
      padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.9rem; width: 100%;
    }
    textarea { resize: vertical; min-height: 220px; font-family: var(--font-serif); line-height: 1.6; }

    .radio-group { display: flex; flex-direction: column; gap: 8px; background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; }
    .radio-label { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; cursor: pointer; }

    /* 右側：プレビューエリア */
    .preview-area {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    /* 用紙枠 */
    .paper {
      width: var(--paper-width);
      height: var(--paper-height);
      background: #ffffff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 40px 45px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .paper-body {
      height: 800px;
      width: 100%;
    }

    /* パターン1：1段見出し用レイアウト */
    .paper-body.layout-p1 {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* パターン2：2段ぶち抜き用レイアウト */
    .paper-body.layout-p2 {
      display: flex;
      flex-direction: row-reverse;
    }

    .p2-header-container {
      height: 100%;
      writing-mode: vertical-rl;
      -webkit-writing-mode: vertical-rl;
      font-family: var(--font-serif);
      margin-left: 15px;
      flex-shrink: 0;
    }

    .p2-body-container {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* 縦書き段（1行26文字がピッタリ収まる高さ） */
    .section {
      height: 375px;
      width: 100%;
      writing-mode: vertical-rl;
      -webkit-writing-mode: vertical-rl;
      font-family: var(--font-serif);
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 0.05em;
      box-sizing: border-box;
      overflow: hidden;
    }

    .section-top { border-bottom: 1px dashed #cbd5e1; padding-bottom: 8px; }
    .section-bottom { padding-top: 8px; }

    .line { margin-left: 8px; white-space: nowrap; }
    .line.heading { font-weight: bold; margin-left: 14px; margin-right: 6px; text-align: center; color: #0f172a; }
    .line.empty { opacity: 0; }

    /* パターン1の二重枠見出し */
    .line.p1-header-box {
      border: 2px double #0f172a;
      padding: 12px 6px;
      margin-left: 14px;
      margin-right: 4px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }

    .p1-title-text { font-weight: bold; font-size: 1.05rem; letter-spacing: 0.15em; text-align: center; }
    .p1-date-text { font-size: 0.78rem; letter-spacing: 0.1em; margin-top: auto; }

    /* パターン2のぶち抜き見出し */
    .line.header-deco { font-size: 0.65rem; color: #475569; letter-spacing: 0.03em; margin-left: 8px; }
    .line.header-title-line { margin-left: 12px; margin-right: 4px; }

    .title-main-text { font-size: 1.15rem; font-weight: bold; letter-spacing: 0.15em; display: block; }
    .date-sub-text { font-size: 0.78rem; letter-spacing: 0.1em; display: block; margin-top: 5em; }

    /* フッター */
    .paper-footer { text-align: center; font-family: var(--font-serif); font-size: 0.85rem; color: #64748b; }

    @media print {
      body { background: none; }
      .sidebar { display: none; }
      .preview-area { padding: 0; background: none; }
      .paper { box-shadow: none; page-break-after: always; }
    }
  </style>
</head>
<body>

  <!-- 左側：操作パネル -->
  <div class="sidebar">
    <h1>生徒会誌 原稿チェッカー</h1>

    <!-- 判定結果カード -->
    <div id="statusCard" class="status-card success">
      <div id="statusTitle" class="status-title">計算中...</div>
      <div id="statusDetail">テキストを入力してください。</div>
    </div>

    <!-- パターン選択 -->
    <div class="form-group">
      <label>見出し（タイトル）のパターン</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="titlePattern" value="1">
          パターン1（1段見出し / 約1000文字まで）
        </label>
        <label class="radio-label">
          <input type="radio" name="titlePattern" value="2" checked>
          パターン2（2段ぶち抜き見出し / 約830文字まで）
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="titleInput">記事タイトル</label>
      <input type="text" id="titleInput" value="栄光の日">
    </div>

    <div class="form-group">
      <label for="dateInput">日付・サブテキスト</label>
      <input type="text" id="dateInput" value="25・7・17">
    </div>

    <div class="form-group">
      <label for="textInput">本文テキスト（Googleドキュメントからそのまま貼り付け）</label>
      <textarea id="textInput">三大行事の形が大きく変わった２０２５年度。その最初を飾る「栄光の日」は、中高共に「今までにない新しい行事にしよう」という、実行委員をはじめとする学園生の強い思いによって創られた。
〈中学生の取り組み〉
中学栄光の日テーマは、「師弟の絆今ここに！私が創るこの瞬間を 私が創（はじ）める挑戦を」。ここには、常に池田先生は心の中にいて、創立者と共に自らの挑戦で学園の歴史を創るという思いが込められている。
さらに、「新時代」の栄光の日という抽象的な言葉をより一歩深め、具体的に創立者が学園生に体現してほしいと願われた「文化」というサブテーマを柱として取り組みを進めた。
拡大会では、愛唱歌斉唱や一言発表などに加えて、例年とは一味、二味違う実行委員企画が行われた。逆再生や翻訳アプリを使ってより面白くしたイントロクイズや、学園の先生方の様々なエピソードのクイズ「学園衝撃グランプリ」。栄光の日の軸である文化をもとにコーデを組み、何を表現しているかを当てる「クレイジーファッションショー」。これらの企画で、伝統は残しつつも皆が楽しめる、一新された拡大会となった。「私がつくる新時代プロジェクト」では、二つのキャンペーンが行われた。「師弟の絆キャンペーン」では、創立者のご指導や名言が掲示された。廊下には、全校に募集されたご指導や耳を傾ける姿勢が自然と身につく。そして二つ目は、学を「自分の生き方」に引き寄せて考える習慣を育むこと。社会や歴史、思想について書かれた文章も、対話を重ねる中で、今の自分や将来の進路と結びつき、血の通ったびへと変わっていく。この２つを目的として、小さな実績の場として輪読会には多くの人が参加している。「一人で研鑽する時よりも色んな人と共に研鑽することで、自分は気づけなかった池田先生が込めてくださっている思いに気づけたり考えを一人一人の経験と考えとリンクさせて」</textarea>
    </div>

    <div class="form-group">
      <label for="pageStartInput">開始ページ番号</label>
      <input type="number" id="pageStartInput" value="19" style="width: 100px;">
    </div>
  </div>

  <!-- 右側：縦書きプレビューエリア -->
  <div class="preview-area" id="previewArea"></div>

  <script>
    // 固定値定義（1行26文字 / 1段21行）
    const CHARS_PER_LINE = 26;
    const LINES_PER_SECTION = 21;

    const inputs = ['titleInput', 'dateInput', 'textInput', 'pageStartInput'];
    inputs.forEach(id => document.getElementById(id).addEventListener('input', updateLayout));
    
    document.querySelectorAll('input[name="titlePattern"]').forEach(radio => {
      radio.addEventListener('change', updateLayout);
    });

    function updateLayout() {
      const titlePattern = document.querySelector('input[name="titlePattern"]:checked').value;
      const title = document.getElementById('titleInput').value || 'タイトル';
      const date = document.getElementById('dateInput').value || '';
      const text = document.getElementById('textInput').value;
      const startPageNum = parseInt(document.getElementById('pageStartInput').value) || 19;

      const bodyLines = parseTextToLines(text, CHARS_PER_LINE);
      const pages = paginate(bodyLines, titlePattern, startPageNum);
      
      updateStatusCard(bodyLines.length, titlePattern, pages);
      renderPreview(pages, title, date, titlePattern);
    }

    function parseTextToLines(text, charsPerLine) {
      if (!text) return [];
      const resultLines = [];

      text.split('\n').forEach(para => {
        let trimmed = para.trim();
        if (trimmed === '') {
          resultLines.push({ type: 'empty', text: '' });
          return;
        }

        if ((trimmed.startsWith('〈') && trimmed.endsWith('〉')) || (trimmed.startsWith('【') && trimmed.endsWith('】'))) {
          resultLines.push({ type: 'heading', text: trimmed });
          return;
        }

        if (!trimmed.startsWith(' ') && !trimmed.startsWith(' ')) {
          trimmed = ' ' + trimmed;
        }

        for (let i = 0; i < trimmed.length; i += charsPerLine) {
          resultLines.push({
            type: 'text',
            text: trimmed.substring(i, i + charsPerLine)
          });
        }
      });

      return resultLines;
    }

    function paginate(bodyLines, titlePattern, startPageNum) {
      const pages = [];
      let currentIdx = 0;
      let pageOffset = 0;

      while (currentIdx < bodyLines.length || pages.length === 0) {
        const isFirstPage = (pageOffset === 0);
        let topCap = LINES_PER_SECTION;
        let bottomCap = LINES_PER_SECTION;

        if (isFirstPage) {
          if (titlePattern === '1') {
            // パターン1：上段のみ3行削り（計39行）
            topCap = LINES_PER_SECTION - 3;
          } else {
            // パターン2：上下2段ぶち抜きで実質5行削り（計32行）
            topCap = LINES_PER_SECTION - 5;
            bottomCap = LINES_PER_SECTION - 5;
          }
        }
        
        const topLines = bodyLines.slice(currentIdx, currentIdx + topCap);
        currentIdx += topLines.length;

        const bottomLines = bodyLines.slice(currentIdx, currentIdx + bottomCap);
        currentIdx += bottomLines.length;

        pages.push({
          pageNum: startPageNum + pageOffset,
          topLines,
          bottomLines,
          isFirstPage
        });
        pageOffset++;
      }

      return pages;
    }

    function updateStatusCard(totalLines, titlePattern, pages) {
      const card = document.getElementById('statusCard');
      // 固定容量：パターン1＝39行 / パターン2＝32行
      const page1Capacity = (titlePattern === '1') ? 39 : 32;

      if (pages.length === 1) {
        card.className = 'status-card success';
        document.getElementById('statusTitle').innerHTML = '✅ 1ページ内に綺麗に収まっています';
        document.getElementById('statusDetail').innerHTML = `総行数: <strong>${totalLines} 行</strong> / 容量: ${page1Capacity} 行<br>(あと <strong>${page1Capacity - totalLines} 行</strong> 入ります)`;
      } else {
        card.className = 'status-card warning';
        document.getElementById('statusTitle').innerHTML = `⚠️ 1ページを超えています（全 ${pages.length} ページ）`;
        const overflow = totalLines - page1Capacity;
        document.getElementById('statusDetail').innerHTML = `1ページ目の容量（${page1Capacity}行）に対し、<strong>${overflow} 行</strong> あふれています。<br>文章を削って調整してください。`;
      }
    }

    function renderPreview(pages, title, date, titlePattern) {
      const container = document.getElementById('previewArea');
      container.innerHTML = '';

      pages.forEach(page => {
        const paper = document.createElement('div');
        paper.className = 'paper';

        const paperBody = document.createElement('div');

        if (page.isFirstPage && titlePattern === '2') {
          // パターン2（2段ぶち抜き）
          paperBody.className = 'paper-body layout-p2';

          const p2HeaderContainer = document.createElement('div');
          p2HeaderContainer.className = 'p2-header-container';

          const decoPattern = '❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁❁';

          const deco1 = document.createElement('div');
          deco1.className = 'line header-deco';
          deco1.textContent = decoPattern;
          p2HeaderContainer.appendChild(deco1);

          const titleEl = document.createElement('div');
          titleEl.className = 'line header-title-line';
          titleEl.innerHTML = `
            <span class="title-main-text">${escapeHtml(title)}</span>
            <span class="date-sub-text">${escapeHtml(date)}</span>
          `;
          p2HeaderContainer.appendChild(titleEl);

          const deco2 = document.createElement('div');
          deco2.className = 'line header-deco';
          deco2.textContent = decoPattern;
          p2HeaderContainer.appendChild(deco2);

          paperBody.appendChild(p2HeaderContainer);

          const p2BodyContainer = document.createElement('div');
          p2BodyContainer.className = 'p2-body-container';

          const sectionTop = document.createElement('div');
          sectionTop.className = 'section section-top';
          page.topLines.forEach(l => sectionTop.appendChild(createLineElement(l)));

          const sectionBottom = document.createElement('div');
          sectionBottom.className = 'section section-bottom';
          page.bottomLines.forEach(l => sectionBottom.appendChild(createLineElement(l)));

          p2BodyContainer.appendChild(sectionTop);
          p2BodyContainer.appendChild(sectionBottom);

          paperBody.appendChild(p2BodyContainer);

        } else {
          // パターン1および2ページ目以降
          paperBody.className = 'paper-body layout-p1';

          const sectionTop = document.createElement('div');
          sectionTop.className = 'section section-top';

          if (page.isFirstPage && titlePattern === '1') {
            const p1Box = document.createElement('div');
            p1Box.className = 'line p1-header-box';
            p1Box.innerHTML = `
              <div class="p1-title-text">${escapeHtml(title)}</div>
              <div class="p1-date-text">${escapeHtml(date)}</div>
            `;
            sectionTop.appendChild(p1Box);
          }

          page.topLines.forEach(l => sectionTop.appendChild(createLineElement(l)));

          const sectionBottom = document.createElement('div');
          sectionBottom.className = 'section section-bottom';
          page.bottomLines.forEach(l => sectionBottom.appendChild(createLineElement(l)));

          paperBody.appendChild(sectionTop);
          paperBody.appendChild(sectionBottom);
        }

        const footer = document.createElement('div');
        footer.className = 'paper-footer';
        footer.textContent = `― ${page.pageNum} ―`;

        paper.appendChild(paperBody);
        paper.appendChild(footer);
        container.appendChild(paper);
      });
    }

    function createLineElement(lineObj) {
      const el = document.createElement('div');
      el.className = `line ${lineObj.type}`;
      el.textContent = lineObj.text;
      return el;
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[m]);
    }

    updateLayout();
  </script>
</body>
</html>
