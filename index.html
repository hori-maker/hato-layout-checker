<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生徒会誌 縦書き原稿チェッカー</title>
  <style>
    :root {
      --bg-color: #cbd5e1;
      --sidebar-width: 360px;
      --paper-width: 680px;
      --paper-height: 920px;
      --font-serif: "Shippori Mincho", "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "MS Mincho", serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: #333;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左側：操作パネル */
    .sidebar {
      width: var(--sidebar-width);
      background: #ffffff;
      border-right: 1px solid #94a3b8;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
      overflow-y: auto;
      flex-shrink: 0;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      z-index: 10;
    }

    .sidebar h1 { font-size: 1.15rem; color: #0f172a; border-bottom: 2px solid #2563eb; padding-bottom: 6px; }

    .status-card { padding: 14px; border-radius: 6px; font-size: 0.9rem; line-height: 1.5; }
    .status-card.success { background-color: #f0fff4; border: 1px solid #86efac; color: #166534; }
    .status-card.warning { background-color: #fff1f2; border: 1px solid #fca5a5; color: #991b1b; }
    .status-title { font-weight: bold; font-size: 1rem; margin-bottom: 4px; }

    .form-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 0.82rem; font-weight: 600; color: #475569; }
    input[type="text"], input[type="number"], textarea {
      padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.88rem; width: 100%;
    }
    textarea { resize: vertical; min-height: 200px; font-family: var(--font-serif); line-height: 1.5; }

    .radio-group { display: flex; flex-direction: column; gap: 6px; background: #f8fafc; padding: 8px; border: 1px solid #e2e8f0; border-radius: 4px; }
    .radio-label { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; cursor: pointer; }

    /* 右側：プレビューエリア */
    .preview-area {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    /* 用紙の外枠（ここは安全な横書きFlexbox） */
    .paper {
      width: var(--paper-width);
      height: var(--paper-height);
      background: #ffffff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 40px 45px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* 🌟 絶対座標のキャンバス（高さ790px固定） */
    .paper-body {
      position: relative;
      width: 100%;
      height: 790px;
      flex-shrink: 0;
    }

    /* 中央の破線（Y座標: 395px地点） */
    .abs-divider {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      border-top: 1px dashed #cbd5e1;
    }

    /* 🌟 絶対座標で配置される「1行」の共通ブロック */
    .abs-line {
      position: absolute;
      width: 26px; /* 行の幅を100%固定（潰れない） */
      height: 380px; /* 上段・下段それぞれの高さ */
      writing-mode: vertical-rl;
      -webkit-writing-mode: vertical-rl;
      font-family: var(--font-serif);
      font-size: 13px;
      line-height: 26px; /* 幅と完全に一致させて中央揃え */
      white-space: nowrap;
      overflow: hidden;
    }

    /* 飾り罫線 */
    .deco-line {
      font-size: 10px;
      color: #475569;
      letter-spacing: 0.03em;
    }

    /* タイトル（パターン2） */
    .title-line {
      font-size: 1.15rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      padding-top: 10px;
    }

    /* 小見出し */
    .heading-line {
      font-weight: bold;
      color: #0f172a;
      text-align: center; /* 縦書き時の上下中央揃え */
    }

    /* 日付（下端固定用の特別ブロック） */
    .abs-date-indep {
      position: absolute;
      width: 26px;
      bottom: 0; /* キャンバスの下端に絶対固定 */
      writing-mode: vertical-rl;
      -webkit-writing-mode: vertical-rl;
      font-family: var(--font-serif);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      line-height: 26px;
      white-space: nowrap;
    }

    /* パターン1の二重枠 */
    .abs-p1-box {
      position: absolute;
      top: 0;
      right: 0;
      width: 74px; /* 3列分の幅 */
      height: 380px;
      border: 2px double #0f172a;
      box-sizing: border-box;
    }
    .p1-title {
      position: absolute;
      top: 12px;
      right: 10px;
      writing-mode: vertical-rl;
      -webkit-writing-mode: vertical-rl;
      font-weight: bold;
      font-size: 1.05rem;
      letter-spacing: 0.15em;
    }
    .p1-date {
      position: absolute;
      bottom: 12px;
      left: 10px;
      writing-mode: vertical-rl;
      -webkit-writing-mode: vertical-rl;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
    }

    /* フッター（ページ番号） */
    .paper-footer {
      text-align: center;
      font-family: var(--font-serif);
      font-size: 0.85rem;
      color: #64748b;
    }

    @media print {
      body { background: none; }
      .sidebar { display: none; }
      .preview-area { padding: 0; background: none; }
      .paper { box-shadow: none; page-break-after: always; }
    }
  </style>
</head>
<body>

  <!-- 左側：操作パネル -->
  <div class="sidebar">
    <h1>生徒会誌 原稿チェッカー</h1>

    <div id="statusCard" class="status-card success">
      <div id="statusTitle" class="status-title">計算中...</div>
      <div id="statusDetail">テキストを入力してください。</div>
    </div>

    <div class="form-group">
      <label>見出し（タイトル）のパターン</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="titlePattern" value="1">
          パターン1（1段見出し / 約1000文字まで）
        </label>
        <label class="radio-label">
          <input type="radio" name="titlePattern" value="2" checked>
          パターン2（2段ぶち抜き見出し / 約930文字まで）
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="titleInput">記事タイトル</label>
      <input type="text" id="titleInput" value="栄光の日">
    </div>

    <div class="form-group">
      <label for="dateInput">日付・サブテキスト（空欄でもOK）</label>
      <input type="text" id="dateInput" value="25・7・17">
    </div>

    <div class="form-group">
      <label for="textInput">本文テキスト（Googleドキュメントからそのまま貼り付け）</label>
      <textarea id="textInput">三大行事の形が大きく変わった２０２５年度。その最初を飾る「栄光の日」は、中高共に「今までにない新しい行事にしよう」という、実行委員をはじめとする学園生の強い思いによって創られた。
〈中学生の取り組み〉
中学栄光の日テーマは、「師弟の絆今ここに！私が創るこの瞬間を 私が創（はじ）める挑戦を」。ここには、常に池田先生は心の中にいて、創立者と共に自らの挑戦で学園の歴史を創るという思いが込められている。
さらに、「新時代」の栄光の日という抽象的な言葉をより一歩深め、具体的に創立者が学園生に体現してほしいと願われた「文化」というサブテーマを柱として取り組みを進めた。
拡大会では、愛唱歌斉唱や一言発表などに加えて、例年とは一味、二味違う実行委員企画が行われた。逆再生や翻訳アプリを使ってより面白くしたイントロクイズや、学園の先生方の様々なエピソードのクイズ「学園衝撃グランプリ」。栄光の日の軸である文化をもとにコーデを組み、何を表現しているかを当てる「クレイジーファッションショー」。これらの企画で、伝統は残しつつも皆が楽しめる、一新された拡大会となった。「私がつくる新時代プロジェクト」では、二つのキャンペーンが行われた。「師弟の絆キャンペーン」では、創立者のご指導や名言が掲示された。廊下には、全校に募集されたご指導や耳を傾ける姿勢が自然と身につく。そして二つ目は、学を「自分の生き方」に引き寄せて考える習慣を育むこと。社会や歴史、思想について書かれた文章も、対話を重ねる中で、今の自分や将来の進路と結びつき、血の通ったびへと変わっていく。この２つを目的として、小さな実績の場として輪読会には多くの人が参加している。「一人で研鑽する時よりも色んな人と共に研鑽することで、自分は気づけなかった池田先生が込めてくださっている思いに気づけたり考えを一人一人の経験と考えとリンクさせて」</textarea>
    </div>

    <div class="form-group">
      <label for="pageStartInput">開始ページ番号</label>
      <input type="number" id="pageStartInput" value="19" style="width: 100px;">
    </div>
  </div>

  <!-- 右側：縦書きプレビューエリア -->
  <div class="preview-area" id="previewArea"></div>

  <script>
    // 定数
    const CHARS_PER_LINE = 26;
    const LINES_PER_SECTION = 21;
    const COL_WIDTH = 26; // 1行の幅（px）
    const ROW_HEIGHT = 380; // 1段の高さ（px）
    const VERTICAL_GAP = 30; // 上段と下段の間の隙間（px）

    const inputs = ['titleInput', 'dateInput', 'textInput', 'pageStartInput'];
    inputs.forEach(id => document.getElementById(id).addEventListener('input', updateLayout));
    
    document.querySelectorAll('input[name="titlePattern"]').forEach(radio => {
      radio.addEventListener('change', updateLayout);
    });

    function updateLayout() {
      const titlePattern = document.querySelector('input[name="titlePattern"]:checked').value;
      const title = document.getElementById('titleInput').value || 'タイトル';
      const date = document.getElementById('dateInput').value || '';
      const text = document.getElementById('textInput').value;
      const startPageNum = parseInt(document.getElementById('pageStartInput').value) || 19;

      const bodyLines = parseTextToLines(text, CHARS_PER_LINE);
      const pages = paginate(bodyLines, titlePattern, startPageNum);
      
      updateStatusCard(bodyLines.length, titlePattern, pages);
      renderPreview(pages, title, date, titlePattern);
    }

    function parseTextToLines(text, charsPerLine) {
      if (!text) return [];
      const resultLines = [];

      text.split('\n').forEach(para => {
        let trimmed = para.trim();
        if (trimmed === '') {
          resultLines.push({ type: 'empty', text: ' ' });
          return;
        }

        if ((trimmed.startsWith('〈') && trimmed.endsWith('〉')) || (trimmed.startsWith('【') && trimmed.endsWith('】'))) {
          resultLines.push({ type: 'heading', text: trimmed });
          return;
        }

        if (!trimmed.startsWith(' ') && !trimmed.startsWith(' ')) {
          trimmed = ' ' + trimmed;
        }

        for (let i = 0; i < trimmed.length; i += charsPerLine) {
          resultLines.push({
            type: 'text',
            text: trimmed.substring(i, i + charsPerLine)
          });
        }
      });

      return resultLines;
    }

    function paginate(bodyLines, titlePattern, startPageNum) {
      const pages = [];
      let currentIdx = 0;
      let pageOffset = 0;

      while (currentIdx < bodyLines.length || pages.length === 0) {
        const isFirstPage = (pageOffset === 0);
        let topCap = LINES_PER_SECTION;
        let bottomCap = LINES_PER_SECTION;

        if (isFirstPage) {
          if (titlePattern === '1') {
            topCap = LINES_PER_SECTION - 3; 
          } else {
            topCap = LINES_PER_SECTION - 3; 
            bottomCap = LINES_PER_SECTION - 3; 
          }
        }
        
        const topLines = bodyLines.slice(currentIdx, currentIdx + topCap);
        currentIdx += topLines.length;

        const bottomLines = bodyLines.slice(currentIdx, currentIdx + bottomCap);
        currentIdx += bottomLines.length;

        pages.push({
          pageNum: startPageNum + pageOffset,
          topLines,
          bottomLines,
          isFirstPage
        });
        pageOffset++;
      }

      return pages;
    }

    function updateStatusCard(totalLines, titlePattern, pages) {
      const card = document.getElementById('statusCard');
      const page1Capacity = (titlePattern === '1') ? 39 : 36;

      if (pages.length === 1) {
        card.className = 'status-card success';
        document.getElementById('statusTitle').innerHTML = '✅ 1ページ内に綺麗に収まっています';
        document.getElementById('statusDetail').innerHTML = `総行数: <strong>${totalLines} 行</strong> / 容量: ${page1Capacity} 行<br>(あと <strong>${page1Capacity - totalLines} 行</strong> 入ります)`;
      } else {
        card.className = 'status-card warning';
        document.getElementById('statusTitle').innerHTML = `⚠️ 1ページを超えています（全 ${pages.length} ページ）`;
        const overflow = totalLines - page1Capacity;
        document.getElementById('statusDetail').innerHTML = `1ページ目の容量（${page1Capacity}行）に対し、<strong>${overflow} 行</strong> あふれています。<br>文章を削って調整してください。`;
      }
    }

    function renderPreview(pages, title, date, titlePattern) {
      const container = document.getElementById('previewArea');
      container.innerHTML = '';

      const decoPattern = '❁'.repeat(40); // 飾り罫線

      pages.forEach(page => {
        const paper = document.createElement('div');
        paper.className = 'paper';

        // 🌟 絶対座標の基準となるキャンバス
        const paperBody = document.createElement('div');
        paperBody.className = 'paper-body';

        // 破線ディバイダーを配置（高さ380px + 隙間15px = Y座標395px地点）
        const divider = document.createElement('div');
        divider.className = 'abs-divider';
        divider.style.top = (ROW_HEIGHT + (VERTICAL_GAP / 2)) + 'px';
        paperBody.appendChild(divider);

        let topColOffset = 0;
        let bottomColOffset = 0;

        if (page.isFirstPage) {
          if (titlePattern === '2') {
            // ----- 上段見出し（3列分） -----
            createAbsElement(paperBody, 0, 0, decoPattern, 'deco');
            createAbsElement(paperBody, 0, 1, title, 'title');
            createAbsElement(paperBody, 0, 2, decoPattern, 'deco');
            topColOffset = 3;

            // ----- 下段見出し（3列分） -----
            createAbsElement(paperBody, 1, 0, decoPattern, 'deco');
            
            // 日付は特別に「下端」にピンポイントで絶対配置する
            const dateEl = document.createElement('div');
            dateEl.className = 'abs-date-indep';
            dateEl.style.right = (1 * COL_WIDTH) + 'px'; // 右から2列目
            dateEl.textContent = date;
            paperBody.appendChild(dateEl);

            createAbsElement(paperBody, 1, 2, decoPattern, 'deco');
            bottomColOffset = 3;

          } else {
            // ----- パターン1見出し -----
            const p1Box = document.createElement('div');
            p1Box.className = 'abs-p1-box';
            
            const titleEl = document.createElement('div');
            titleEl.className = 'p1-title';
            titleEl.textContent = title;
            
            const dateEl = document.createElement('div');
            dateEl.className = 'p1-date';
            dateEl.textContent = date;

            p1Box.appendChild(titleEl);
            p1Box.appendChild(dateEl);
            paperBody.appendChild(p1Box);
            
            topColOffset = 3;
          }
        }

        // ----- 上段の本文を座標配置 -----
        page.topLines.forEach((l, i) => {
          createAbsElement(paperBody, 0, topColOffset + i, l.text, l.type);
        });

        // ----- 下段の本文を座標配置 -----
        page.bottomLines.forEach((l, i) => {
          createAbsElement(paperBody, 1, bottomColOffset + i, l.text, l.type);
        });

        const footer = document.createElement('div');
        footer.className = 'paper-footer';
        footer.textContent = `― ${page.pageNum} ―`;

        paper.appendChild(paperBody);
        paper.appendChild(footer);
        container.appendChild(paper);
      });
    }

    // 🛠️ 魔法の絶対座標配置関数（ブラウザバグを完全回避）
    function createAbsElement(container, row, col, content, type) {
      if (type === 'empty' && content === '') return;

      const el = document.createElement('div');
      let className = 'abs-line';

      if (type === 'heading') className += ' heading-line';
      if (type === 'deco') className += ' deco-line';
      if (type === 'title') className += ' title-line';

      el.className = className;
      el.textContent = content; // XSS対策＋改行崩れ防止

      // X座標（右からのピクセル数）
      const rightPos = col * COL_WIDTH;
      
      // Y座標（上段は0、下段は 380 + 30 = 410px）
      const topPos = row === 0 ? 0 : (ROW_HEIGHT + VERTICAL_GAP);

      el.style.right = rightPos + 'px';
      el.style.top = topPos + 'px';

      container.appendChild(el);
    }

    updateLayout();
  </script>
</body>
</html>
